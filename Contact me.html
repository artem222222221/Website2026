<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Contact Me</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style type="text/css">

body{
    margin:0;
    padding:0;
    background:#f0f0f0;
    font-family:"Open Sans", Arial, sans-serif;
    color:#333333;
}

.cont{
    width:1000px;
    margin:30px auto;
    background-color:#ffffff;
    box-shadow:0px 0px 15px rgba(0,0,0,0.10);
}

.Head{
    height:130px;
    background:#e6e6e6;
    text-align:center;
    line-height:130px;
    border-bottom:3px solid #d9d9d9;
}

.Head h1{
    margin:0;
}

.cont .Head strong{
    font-family:"Montserrat", Arial, sans-serif;
    font-size:42px;
    letter-spacing:3px;
    color:#333333;
    position:relative;
}

.cont .Head strong::after{
    content:"";
    display:block;
    width:180px;
    height:3px;
    background:#9aa7a1;
    margin:5px auto 0 auto;
}

.nav{
    background:#f5f5f5;
    padding:10px 0;
    border-bottom:2px solid #e0e0e0;
}

.nav table{
    margin:auto;
    border-collapse:collapse;
}

.nav td{
    padding:5px;
}

.nav a{
    text-decoration:none;
}

.left{
    float:left;
    width:550px;
    min-height:650px;
    background:#fafafa;
    padding:30px;
    box-sizing:border-box;
}

.left h2{
    font-family:Calibri, Arial, sans-serif;
    font-size:32px;
    margin-top:0;
    color:#3f3f3f;
    border-left:5px solid #9aa7a1;
    padding-left:12px;
}

.left p{
    line-height:1.9;
    font-size:16px;
    color:#444444;
    text-align:justify;
}

.contact-form{
    margin-top:25px;
}

.contact-form label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#444444;
}

.contact-form input,
.contact-form textarea{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    border:1px solid #cccccc;
    background:#ffffff;
    font-size:15px;
    box-sizing:border-box;
    font-family:"Open Sans", Arial, sans-serif;
}

.contact-form textarea{
    height:140px;
    resize:none;
}

.contact-form button{
    background:#9aa7a1;
    color:#ffffff;
    border:none;
    padding:12px 30px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.contact-form button:hover{
    background:#7f8b85;
}

.right{
    float:right;
    width:450px;
    min-height:650px;
    background:#eeeeee;
    text-align:center;
    padding-top:40px;
    box-sizing:border-box;
}

.image-box{
    width:340px;
    height:200px;
    margin:25px auto;
    background:#ffffff;
    overflow:hidden;
}

.image-box img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.contact-info{
    margin-top:30px;
    font-size:18px;
    line-height:2;
    color:#444444;
}

.footer{
    clear:both;
    height:90px;
    background:#e6e6e6;
    text-align:center;
    line-height:90px;
    font-family:Calibri, Arial, sans-serif;
    border-top:3px solid #d9d9d9;
    color:#333333;
}

.footer span{
    color:#6f7a75;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="cont">

    <div class="Head">
        <h1><strong>CONTACT ME</strong></h1>
    </div>

    <div class="nav">

        <table width="1000" height="100">
            <tr>

                <td>
                    <a href="index.html">
                        <img src="button_homepage.png" width="325" height="100" alt="Homepage">
                    </a>
                </td>

                <td>
                    <a href="About me.html">
                        <img src="button_about-me.png" width="325" height="100" alt="About Me">
                    </a>
                </td>

                <td>
                    <a href="Hobbies.html">
                        <img src="button_hobbies.png" width="317" height="100" alt="Hobbies">
                    </a>
                </td>

            </tr>
        </table>

    </div>

    <div class="left">

        <h2>Get In Touch</h2>

        <p>
            If you would like to contact me about my work, studies, or future opportunities,
            please complete the form below.
        </p>

        <div class="contact-form">

            <form action="https://formspree.io/f/mkoaayon" method="POST">

                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email address" required>

                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" placeholder="Enter message subject" required>

                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Write your message here" required></textarea>

                <button type="submit">Send Message</button>

            </form>

        </div>

    </div>

    <div class="right">

        <div class="image-box">
            <img src="istockphoto-1168945108-612x612.png" alt="">
        </div>

        <div class="image-box">
            <img src="emaill.png" alt="">
        </div>

        <div class="contact-info">
            <p><strong>Email:</strong><br>
            758826@student.cavc.ac.uk</p>

            <p><strong>Location:</strong><br>
            Cardiff and Vale College, Cardiff, Wales</p>
        </div>

    </div>

    <div class="footer">
        © 2026 <span>Artem Digital Portfolio</span> | IT Student
    </div>

</div>

</body>
</html>
